naftiko: 1.0.0-alpha2
info:
  label: Telstra Messaging API — MMS
  description: 'Telstra Messaging API — MMS. 4 operations: send MMS, get replies, check status, healthcheck.
    Self-contained Naftiko capability for the MMS business surface.'
  tags:
  - Telstra
  - Messaging
  - MMS
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    TELSTRA_ACCESS_TOKEN: TELSTRA_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: messaging-mms
    baseUri: https://tapi.telstra.com/v2
    description: Telstra Messaging MMS surface. Bearer token from /oauth/token (NSMS scope).
    resources:
    - name: messages-mms
      path: /messages/mms
      operations:
      - name: sendmms
        method: POST
        description: Telstra Send MMS
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: getmmsreplies
        method: GET
        description: Telstra Get MMS Replies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: messages-mms-status
      path: /messages/mms/{messageId}/status
      operations:
      - name: getmmsstatus
        method: GET
        description: Telstra Get MMS Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: messageId
          in: path
          type: string
          required: true
    - name: messages-mms-healthcheck
      path: /messages/mms/healthcheck
      operations:
      - name: mmshealthcheck
        method: GET
        description: Telstra MMS Healthcheck
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.TELSTRA_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: messaging-mms-mcp
    port: 9091
    transport: http
    description: MCP adapter for Telstra Messaging MMS.
    tools:
    - name: telstra-send-mms
      description: Telstra Send MMS
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: messaging-mms.sendmms
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: telstra-get-mms-replies
      description: Telstra Get MMS Replies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: messaging-mms.getmmsreplies
      outputParameters:
      - type: object
        mapping: $.
    - name: telstra-get-mms-status
      description: Telstra Get MMS Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: messaging-mms.getmmsstatus
      with:
        messageId: tools.messageId
      outputParameters:
      - type: object
        mapping: $.
